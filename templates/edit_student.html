<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student | Visionary Graders</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #003366;
            --accent-blue: #007bff;
            --hover-blue: #004a99;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            margin: 0;
            min-height: 100vh;
        }
        header {
            background: white;
            padding: 10px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }
        .logo-container { display: flex; align-items: center; gap: 15px; }
        .logo-container img { height: 100px; }
        .logout-btn {
            background: #ff4d4d;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s ease;
        }
        .logout-btn:hover { background: #cc0000; }
        .nav-links { display: flex; gap: 15px; }
        .nav-link {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .nav-link:hover { background: #e0eafc; }
        .nav-link.active { background: var(--primary-blue); color: white; }
        .main-content {
            padding: 60px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        h1 { color: var(--primary-blue); margin-top: 0; }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
        }
        .form-group label {
            font-size: 0.85em;
            font-weight: 600;
            color: var(--primary-blue);
        }
        .form-group input {
            padding: 12px 14px;
            border: 2px solid #cbd5e0;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95em;
            transition: border-color 0.3s;
            outline: none;
        }
        .form-group input:focus { border-color: var(--accent-blue); }
        .btn-save {
            width: 100%;
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-save:hover { background: var(--hover-blue); }
        .btn-cancel {
            display: block;
            text-align: center;
            margin-top: 12px;
            color: #a0aec0;
            text-decoration: none;
            font-size: 0.9em;
        }
        .btn-cancel:hover { color: var(--primary-blue); }
    </style>
</head>
<body>
<header>
    <div class="logo-container">
        <img src="{{ url_for('static', filename='team_logo.png') }}" alt="Team">
        <div class="team-info"><h2>Visionary Graders</h2></div>
    </div>
    <div style="display:flex; align-items:center; gap:30px;">
        <nav class="nav-links">
            <a href="/exams"    class="nav-link">Exams</a>
            <a href="/grading"  class="nav-link">Grading</a>
            <a href="/students" class="nav-link active">Students</a>
        </nav>
        <a href="/logout" class="logout-btn">Logout</a>
    </div>
</header>

<div class="main-content">
    <div class="container">
        <h1>Edit Student</h1>
        <form method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" value="{{ student.FullName }}" required>
            </div>
            <div class="form-group">
                <label>University ID</label>
                <input type="text" name="student_code" value="{{ student.StudentCode }}" required>
            </div>
            <div class="form-group">
                <label>Class</label>
                <input type="text" name="student_class" value="{{ student.Class or '' }}">
            </div>
            <button type="submit" class="btn-save">Save Changes</button>
            <a href="/students" class="btn-cancel">Cancel</a>
        </form>
    </div>
</div>
</body>
</html>
