<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grading Status | Visionary Graders</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 100%; }
        h2 { color: #003366; }
        .progress-container { background: #eee; border-radius: 10px; height: 20px; width: 100%; margin: 25px 0; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #003366, #007bff); height: 100%; width: 0%; transition: width 0.4s ease; }
        .status-text { color: #666; font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Grading Submissions</h2>
        <p class="status-text" id="status">Initializing grading pipeline...</p>
        
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        
        <p class="status-text" id="file-info">Preparing documents...</p>
    </div>

    <script>
        // Connect to the Server-Sent Events stream using the dynamic session_id
        const sessionId = "{{ session_id }}";
        const eventSource = new EventSource(`/grading/progress/${sessionId}`);

        const progressBar = document.getElementById('progress-bar');
        const statusText = document.getElementById('status');
        const fileInfo = document.getElementById('file-info');

        eventSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            if (data.total) {
                // Calculate percentage progress
                const percentage = Math.round((data.current / data.total) * 100);
                progressBar.style.width = `${percentage}%`;
                statusText.innerText = `Processing exam ${data.current} of ${data.total}`;
                fileInfo.innerText = `Currently analyzing: ${data.filename}`;
            }

            // Once the background thread marks 'done' as true, route to results page
            if (data.done) {
                eventSource.close();
                statusText.innerText = "Grading complete! Redirecting...";
                setTimeout(() => {
                    window.location.href = "/results";
                }, 1000);
            }
        };

        eventSource.onerror = function() {
            eventSource.close();
        };
    </script>
</body>
</html>
